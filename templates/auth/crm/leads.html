<!DOCTYPE html>
<html>
<head>
    <title>Lead Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{ background:#f4f7fc; }
        .container-box{
            margin-top:40px;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 15px rgba(0,0,0,0.1);
        }
        h2{ color:#0d6efd; margin-bottom:20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="container-box">
        <h2>Lead Management</h2>

        <table class="table table-bordered table-hover">
            <thead class="table-primary">
                <tr>
                    <th>ID</th>
                    <th>Lead Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Company</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                {% for lead in leads %}
                <tr>
                    <td>{{ lead[0] }}</td>
                    <td>{{ lead[1] }}</td>
                    <td>{{ lead[2] }}</td>
                    <td>{{ lead[3] }}</td>
                    <td>{{ lead[4] }}</td>
                    <td>{{ lead[5] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <a href="/add-lead" class="btn btn-success">+ Add New Lead</a>
        <a href="/dashboard" class="btn btn-primary">Dashboard</a>
    </div>
</div>
</body>
</html>
