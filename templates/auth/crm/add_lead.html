<!DOCTYPE html>
<html>
<head>
    <title>Add Lead</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{ background:#f4f7fc; }
        .container-box{
            margin-top:40px;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 15px rgba(0,0,0,0.1);
        }
        h2{ color:#0d6efd; margin-bottom:20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="container-box">
        <h2>Add New Lead</h2>

        <form action="/save_lead" method="POST">

            <div class="mb-3">
                <label class="form-label">Lead Name</label>
                <input type="text" name="lead_name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Phone</label>
                <input type="text" name="phone" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Company</label>
                <input type="text" name="company" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Status</label>
                <select name="status" class="form-control">
                    <option value="New">New</option>
                    <option value="Contacted">Contacted</option>
                    <option value="Qualified">Qualified</option>
                    <option value="Lost">Lost</option>
                </select>
            </div>

            <button type="submit" class="btn btn-success">Save Lead</button>
            <a href="/leads" class="btn btn-secondary">Cancel</a>

        </form>
    </div>
</div>
</body>
</html>
