<!DOCTYPE html>
<html>
<head>
    <title>OneHub AI - Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f7fc;
        }

        .login-card{
            width:450px;
            margin:auto;
            margin-top:100px;
            padding:30px;
            border-radius:15px;
            background:white;
            box-shadow:0 0 20px rgba(0,0,0,0.1);
        }

        .logo{
            text-align:center;
            font-size:35px;
            font-weight:bold;
            color:#0d6efd;
            margin-bottom:20px;
        }
    </style>
</head>

<body>

<div class="login-card">

    <div class="logo">
        OneHub AI
    </div>

    <h3 class="text-center mb-4">User Login</h3>

    <form action="/login" method="POST">

        <div class="mb-3">
            <input
                type="text"
                class="form-control"
                placeholder="Username"
                name="username"
                required>
        </div>

        <div class="mb-3">
            <input
                type="password"
                class="form-control"
                placeholder="Password"
                name="password"
                required>
        </div>

        <button type="submit" class="btn btn-primary w-100">
            Login
        </button>

    </form>

    <div class="text-center mt-3">
        Don't have an account?
        <a href="/">Register</a>
    </div>

</div>

</body>
</html>
