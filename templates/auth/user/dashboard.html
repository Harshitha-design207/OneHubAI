<!DOCTYPE html>
<html>
<head>
    <title>OneHub AI Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            margin:0;
            background:#f4f7fc;
        }

        .sidebar{
            width:250px;
            height:100vh;
            background:#0d6efd;
            position:fixed;
            left:0;
            top:0;
            color:white;
        }

        .sidebar h3{
            text-align:center;
            padding:20px;
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            padding:15px 20px;
        }

        .sidebar a:hover{
            background:white;
            color:#0d6efd;
        }

        .content{
            margin-left:270px;
            padding:20px;
        }

        .card{
            border:none;
            border-radius:15px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h3>OneHub AI</h3>

        <a href="#">Dashboard</a>
        <a href="/add-lead">Leads</a>
        <a href="/customers">Customers</a>
        <a href="/tasks">Tasks</a>
        <a href="/attendance">Attendance</a>
        <a href="/login">Logout</a>
    </div>

    <div class="content">

        <h2>Welcome to OneHub AI 🚀</h2>
        <p>CRM + ERP Platform</p>

        <div class="row mt-4">

    <div class="col-md-3">
        <div class="card p-3">
            <h5>Total Leads</h5>
            <h2>{{ total_leads }}</h2>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card p-3">
            <h5>Customers</h5>
            <h2>3</h2>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card p-3">
            <h5>Tasks</h5>
            <h2>3</h2>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card p-3">
            <h5>Attendance</h5>
            <h2>85%</h2>
        </div>
    </div>

</div>

    </div>

</body>
</html>
